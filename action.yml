name: 'stillrunning Security Scan v3'
description: 'Supply chain attack protection. Checks blocklist, detects yanked packages, AI scanning.'
author: 'stillrunning.io'
branding:
  icon: 'shield'
  color: 'green'

inputs:
  token:
    description: 'stillrunning.io API token (optional, enables AI scanning)'
    required: false
    default: ''
  files:
    description: 'Dependency files to scan (comma-separated)'
    required: false
    default: 'requirements.txt,requirements-dev.txt,package.json,pyproject.toml'
  scan-imports:
    description: 'Scan Python import statements in source files'
    required: false
    default: 'true'
  python-paths:
    description: 'Paths to scan for Python imports (comma-separated globs)'
    required: false
    default: '**/*.py'
  fail-on-dangerous:
    description: 'Fail the workflow if dangerous packages are found'
    required: false
    default: 'true'
  fail-on-suspicious:
    description: 'Fail the workflow if suspicious packages are found'
    required: false
    default: 'false'
  comment-on-pr:
    description: 'Post results as a PR comment'
    required: false
    default: 'true'
  verify-hashes:
    description: 'Verify package hashes against PyPI registry'
    required: false
    default: 'true'

outputs:
  result:
    description: 'Scan result: pass, warn, or fail'
  dangerous-count:
    description: 'Number of dangerous packages found'
  suspicious-count:
    description: 'Number of suspicious packages found'
  blocklist-hits:
    description: 'Number of packages found in blocklist'
  yanked-count:
    description: 'Number of yanked packages found'
  imports-scanned:
    description: 'Number of import statements scanned'
  packages-scanned:
    description: 'Number of packages scanned'

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.token }}
    - ${{ inputs.files }}
    - ${{ inputs.fail-on-dangerous }}
    - ${{ inputs.fail-on-suspicious }}
    - ${{ inputs.comment-on-pr }}
    - ${{ inputs.scan-imports }}
    - ${{ inputs.python-paths }}
    - ${{ inputs.verify-hashes }}
